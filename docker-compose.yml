services:
  postgres:
    image: postgres:16
    container_name: sms-postgres
    environment:
      POSTGRES_DB: student_db
      POSTGRES_USER: sms_user
      POSTGRES_PASSWORD: sms_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sms_user -d student_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
