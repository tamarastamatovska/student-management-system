services:
  postgres:
    image: postgres:16
    container_name: sms-postgres
    environment:
      POSTGRES_DB: student_db
      POSTGRES_USER: sms_user
      POSTGRES_PASSWORD: sms_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sms_user -d student_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: sms-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/student_db
      SPRING_DATASOURCE_USERNAME: sms_user
      SPRING_DATASOURCE_PASSWORD: sms_pass
      CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: sms-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
