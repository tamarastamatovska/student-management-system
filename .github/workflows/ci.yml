name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Test backend
        run: mvn -B test
        working-directory: backend

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          npm ci
          npm run build
        working-directory: frontend

  docker-publish:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sms-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/sms-backend:sha-${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sms-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/sms-frontend:sha-${{ github.sha }}

  deploy-kubernetes:
    needs: docker-publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig \
            --name "${{ secrets.EKS_CLUSTER_NAME }}" \
            --region "${{ secrets.AWS_REGION }}"
          kubectl cluster-info

      - name: Install envsubst
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: Deploy to Kubernetes
        env:
          IMAGE_BACKEND: ${{ secrets.DOCKERHUB_USERNAME }}/sms-backend:sha-${{ github.sha }}
          IMAGE_FRONTEND: ${{ secrets.DOCKERHUB_USERNAME }}/sms-frontend:sha-${{ github.sha }}
        run: |
          chmod +x k8s/deploy.sh
          ./k8s/deploy.sh

      - name: Wait for ALB and patch CORS
        run: |
          echo "Waiting for ALB hostname (up to 5 minutes)..."
          ALB=""
          for _ in $(seq 1 30); do
            ALB=$(kubectl get ingress sms-ingress -n sms \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -n "$ALB" ]; then
              break
            fi
            sleep 10
          done

          if [ -z "$ALB" ]; then
            echo "::warning::ALB hostname not ready yet. Check ingress later with kubectl."
            kubectl get ingress sms-ingress -n sms || true
            exit 0
          fi

          echo "ALB hostname: $ALB"
          kubectl patch configmap backend-config -n sms --type merge \
            -p "{\"data\":{\"CORS_ALLOWED_ORIGINS\":\"http://localhost,http://localhost:5173,http://${ALB}\"}}"
          kubectl rollout restart deployment/backend -n sms
          kubectl rollout status deployment/backend -n sms --timeout=180s

          echo "## Deployment live" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**App URL:** http://${ALB}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**API test:** http://${ALB}/api/students/stats" >> "$GITHUB_STEP_SUMMARY"

      - name: Show cluster resources
        run: kubectl get all,ingress,pvc -n sms
