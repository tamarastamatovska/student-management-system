name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Test backend
        run: mvn -B test
        working-directory: backend

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          npm ci
          npm run build
        working-directory: frontend

  docker-publish:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sms-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/sms-backend:sha-${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sms-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/sms-frontend:sha-${{ github.sha }}

  deploy-kubernetes:
    needs: docker-publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: sms
      url: ${{ steps.deploy-url.outputs.app_url }}
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify EKS cluster exists
        env:
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
        run: |
          if ! aws eks describe-cluster --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "::error::EKS cluster '$EKS_CLUSTER_NAME' not found in $AWS_REGION."
            echo ""
            echo "Run these workflows IN ORDER:"
            echo "  1. Actions → Provision EKS → Run workflow (wait until green)"
            echo "  2. Actions → CI/CD → Re-run all jobs"
            echo ""
            echo "If you just ran Destroy EKS, you must Provision EKS again before CI/CD."
            exit 1
          fi
          echo "Cluster found."

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig \
            --name "${{ secrets.EKS_CLUSTER_NAME }}" \
            --region "${{ secrets.AWS_REGION }}"
          kubectl cluster-info

      - name: Install envsubst
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: Deploy to Kubernetes
        env:
          IMAGE_BACKEND: ${{ secrets.DOCKERHUB_USERNAME }}/sms-backend:sha-${{ github.sha }}
          IMAGE_FRONTEND: ${{ secrets.DOCKERHUB_USERNAME }}/sms-frontend:sha-${{ github.sha }}
        run: |
          chmod +x k8s/deploy.sh
          ./k8s/deploy.sh

      - name: Dump deploy errors on failure
        if: failure()
        run: |
          kubectl get nodes
          kubectl get pods,pvc,events -n sms --sort-by='.lastTimestamp' 2>/dev/null || true
          kubectl describe pod -l app=postgres -n sms 2>/dev/null | tail -60 || true
          kubectl describe pvc -n sms 2>/dev/null | tail -40 || true

      - name: Wait for LoadBalancer and patch CORS
        id: deploy-url
        run: |
          echo "Waiting for frontend LoadBalancer hostname (up to 5 minutes)..."
          LB=""
          for _ in $(seq 1 30); do
            LB=$(kubectl get svc frontend -n sms \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -n "$LB" ]; then
              break
            fi
            sleep 10
          done

          if [ -z "$LB" ]; then
            echo "::warning::LoadBalancer hostname not ready yet. Check: kubectl get svc frontend -n sms"
            kubectl get svc frontend -n sms || true
            exit 0
          fi

          ELB_PREFIX="${LB%%.*}"
          APP_URL="http://${ELB_PREFIX}.${AWS_REGION}.elb.amazonaws.com/"
          APP_URL_API="${APP_URL}api/students/stats"

          # GitHub redacts Secret values in job summaries. HTML-encode the region so the
          # summary renders a normal URL but the raw text does not match the secret.
          REGION_SUMMARY=$(echo "$AWS_REGION" | sed 's/-/&#45;/g')
          SUMMARY_APP_URL="http://${ELB_PREFIX}.${REGION_SUMMARY}.elb.amazonaws.com/"
          SUMMARY_API_URL="http://${ELB_PREFIX}.${REGION_SUMMARY}.elb.amazonaws.com/api/students/stats"

          kubectl patch configmap backend-config -n sms --type merge \
            -p "{\"data\":{\"CORS_ALLOWED_ORIGINS\":\"http://localhost,http://localhost:5173,http://${ELB_PREFIX}.${AWS_REGION}.elb.amazonaws.com\"}}"
          kubectl rollout restart deployment/backend -n sms
          kubectl rollout status deployment/backend -n sms --timeout=180s

          printf '%s\n%s\n' "$APP_URL" "$APP_URL_API" > deployment-url.txt
          echo "url_ready=true" >> "$GITHUB_OUTPUT"
          echo "app_url=${APP_URL}" >> "$GITHUB_OUTPUT"

          {
            echo "## Deployment live"
            echo ""
            echo "Copy into your browser **address bar** (not Google search):"
            echo ""
            echo "${SUMMARY_APP_URL}"
            echo ""
            echo "**API test:**"
            echo ""
            echo "${SUMMARY_API_URL}"
            echo ""
            echo "Or use **View deployment** (top of this workflow run) for a direct link."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload deployment URL
        if: steps.deploy-url.outputs.url_ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: deployment-url
          path: deployment-url.txt
          retention-days: 30

      - name: Show cluster resources
        run: kubectl get all,pvc -n sms
