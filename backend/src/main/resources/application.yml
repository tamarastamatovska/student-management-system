spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/student_db}
    username: ${SPRING_DATASOURCE_USERNAME:sms_user}
    password: ${SPRING_DATASOURCE_PASSWORD:sms_pass}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
