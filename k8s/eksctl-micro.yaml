# Same as eksctl.yaml — kept for reference (Free plan, 2× t3.micro).

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: ${EKS_CLUSTER_NAME}
  region: ${AWS_REGION}
  version: "1.30"

iam:
  withOIDC: true

autoModeConfig:
  enabled: false

addons:
  - name: vpc-cni
    configurationValues: |-
      env:
        ENABLE_PREFIX_DELEGATION: "true"
        WARM_PREFIX_TARGET: "1"
  - name: coredns
    configurationValues: |-
      replicaCount: 1
  - name: kube-proxy
  - name: aws-ebs-csi-driver
    wellKnownPolicies:
      ebsCSIController: true

managedNodeGroups:
  - name: sms-nodes
    instanceTypes: ["t3.micro"]
    maxPodsPerNode: 110
    desiredCapacity: 2
    minSize: 2
    maxSize: 2
    volumeSize: 20
    privateNetworking: false
