# EKS cluster config — use after upgrading AWS from Free account plan.
# t3.medium (4 GB RAM) is required to run postgres + backend + frontend reliably.
#
#   Destroy EKS → Provision EKS (with this file as eksctl.yaml)

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: ${EKS_CLUSTER_NAME}
  region: ${AWS_REGION}
  version: "1.30"

iam:
  withOIDC: true

autoModeConfig:
  enabled: false

addons:
  - name: vpc-cni
    configurationValues: |-
      env:
        ENABLE_PREFIX_DELEGATION: "true"
        WARM_PREFIX_TARGET: "1"
  - name: coredns
    configurationValues: |-
      replicaCount: 1
  - name: kube-proxy

managedNodeGroups:
  - name: sms-nodes
    instanceTypes: ["t3.medium"]
    maxPodsPerNode: 110
    desiredCapacity: 1
    minSize: 1
    maxSize: 1
    volumeSize: 20
    privateNetworking: false
