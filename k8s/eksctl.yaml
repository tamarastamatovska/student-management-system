# Standard AWS account EKS cluster (used by Provision EKS GitHub Actions workflow).
#
# Substituted from env: EKS_CLUSTER_NAME, AWS_REGION
#
# Uses t3.micro — Free Tier eligible (required on new "Free account plan" AWS accounts).
# If your account allows paid instances, you can switch to t3.medium for more RAM.
#
# Manual create:
#   export EKS_CLUSTER_NAME=sms-cluster AWS_REGION=eu-north-1
#   envsubst < k8s/eksctl.yaml | eksctl create cluster -f - --timeout 90m

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: ${EKS_CLUSTER_NAME}
  region: ${AWS_REGION}
  version: "1.30"

iam:
  withOIDC: true

autoModeConfig:
  enabled: false

managedNodeGroups:
  - name: sms-nodes
    instanceTypes: ["t3.micro"]
    desiredCapacity: 1
    minSize: 1
    maxSize: 1
    volumeSize: 20
    privateNetworking: false
