# Standard AWS account EKS cluster (used by Provision EKS GitHub Actions workflow).
#
# Substituted from env: EKS_CLUSTER_NAME, AWS_REGION, AWS_AZ (e.g. eu-north-1a)
#
# Manual create:
#   export EKS_CLUSTER_NAME=sms-cluster AWS_REGION=eu-north-1 AWS_AZ=eu-north-1a
#   envsubst < k8s/eksctl.yaml | eksctl create cluster -f - --timeout 90m

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: ${EKS_CLUSTER_NAME}
  region: ${AWS_REGION}
  version: "1.30"

availabilityZones:
  - ${AWS_AZ}

iam:
  withOIDC: true

autoModeConfig:
  enabled: false

managedNodeGroups:
  - name: sms-nodes
    instanceTypes: ["t3.medium", "t3.large", "m5.large"]
    desiredCapacity: 1
    minSize: 1
    maxSize: 1
    volumeSize: 20
    privateNetworking: false
