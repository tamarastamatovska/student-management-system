# Standard AWS account EKS cluster (used by Provision EKS GitHub Actions workflow).
#
# Substituted from env: EKS_CLUSTER_NAME, AWS_REGION
#
# t3.micro = Free Tier eligible but only ~4 pod slots without tuning.
# Addons below omit metrics-server and enable prefix delegation for more pods.
# For reliable demos, upgrade AWS account and use t3.medium instead.
#
# Manual create:
#   export EKS_CLUSTER_NAME=sms-cluster AWS_REGION=eu-north-1
#   envsubst < k8s/eksctl.yaml | eksctl create cluster -f - --timeout 90m

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: ${EKS_CLUSTER_NAME}
  region: ${AWS_REGION}
  version: "1.30"

iam:
  withOIDC: true

autoModeConfig:
  enabled: false

addons:
  - name: vpc-cni
    configurationValues: |-
      env:
        ENABLE_PREFIX_DELEGATION: "true"
        WARM_PREFIX_TARGET: "1"
  - name: coredns
    configurationValues: |-
      replicaCount: 1
  - name: kube-proxy

managedNodeGroups:
  - name: sms-nodes
    instanceTypes: ["t3.micro"]
    maxPodsPerNode: 110
    desiredCapacity: 1
    minSize: 1
    maxSize: 1
    volumeSize: 20
    privateNetworking: false
